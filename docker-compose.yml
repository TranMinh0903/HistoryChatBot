services:
  db:
    image: postgres:16-alpine
    container_name: lsd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lichsudang
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lichsudang"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: lsd_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

  # Backend C# — bạn thêm vào sau, ví dụ:
  # api:
  #   build: ./backend
  #   ports: ["5000:8080"]
  #   environment:
  #     - ConnectionStrings__Default=Host=db;Database=lichsudang;Username=postgres;Password=postgres
  #     - GROQ_API_KEY=${GROQ_API_KEY}
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  pgdata:
