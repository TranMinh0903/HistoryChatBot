services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lsd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lichsudang
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lichsudang"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: lsd_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"   # host 8081 (8080 hay bị process khác chiếm) -> container 8080
    depends_on:
      - db

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lsd_api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Port=5432;Database=lichsudang;Username=postgres;Password=postgres
      - Jwt__Key=CHANGE_ME_super_secret_key_at_least_32_characters_long_123456
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
